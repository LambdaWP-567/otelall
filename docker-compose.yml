version: '3.8'

services:
  influxdb:
    build: ./influxdb
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mysecrettoken
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influx-provisioning:
    image: influxdb:2.7-alpine
    container_name: influx-provisioning
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mysecrettoken
      - DOCKER_INFLUXDB_INIT_ORG=myorg
    volumes:
      - ./influxdb/provision_dashboard.py:/usr/local/bin/provision_dashboard.py:ro
    # Install requests and run script
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache python3 py3-requests && python3 /usr/local/bin/provision_dashboard.py"]

  grafana:
    build: ./grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_HTTP_PORT=3000
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    build: ./otel-collector
    container_name: otel-collector
    volumes:
      - ./otel-collector/config:/etc/otelcol-config
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/hostfs:ro
    environment:
      - INFLUXDB_TOKEN=mysecrettoken
      - WATCH_INTERVAL=5s
    depends_on:
      influxdb:
        condition: service_healthy

  config-ui:
    build: ./config-ui
    container_name: config-ui
    ports:
      - "8000:8000"
    volumes:
      - ./otel-collector/config:/etc/otelcol-config
    depends_on:
      - otel-collector

  config-ui-v2:
    build: ./config-ui-v2
    container_name: config-ui-v2
    ports:
      - "8001:8001"
    volumes:
      - ./otel-collector/config:/etc/otelcol-config
    depends_on:
      - otel-collector

  simulator:
    build: ./simulator
    container_name: simulator
    depends_on:
      - otel-collector

  e2e-tests:
    build: ./e2e-tests
    container_name: e2e-tests
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=mysecrettoken
      - INFLUXDB_ORG=myorg
      - INFLUXDB_BUCKET=metrics
      - GRAFANA_URL=http://grafana:3000
    depends_on:
      influxdb:
        condition: service_healthy
      grafana:
        condition: service_healthy

volumes:
  influxdb_data:
  grafana_data:
