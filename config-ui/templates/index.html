<!DOCTYPE html>
<html>
<head>
    <title>OTel Collector Config UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">OTel Collector Configuration</h1>
        <form action="/save" method="post">
            <div class="mb-3">
                <label for="config" class="form-label">config.yaml</label>
                <textarea class="form-control" id="config" name="config" rows="20">{{ config_content }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save and Restart Collector</button>
        </form>
        <div class="mt-3 text-muted">
            <small>Note: The collector will automatically restart within 5 seconds of saving.</small>
        </div>
    </div>
</body>
</html>
